ai_usage_summary: |
  Used Gemini as an AI coding assistant to quickly scaffold the repository, build the JSONL streaming pipeline, implement the Honeypot heuristics, build the FAISS/MiniLM integration, and debug ties in the candidate validation constraints. 

methodology_summary: |
  To navigate the 5-minute CPU constraint, we first pre-filtered the 100k candidate pool using an O(1) keyword boolean check for base AI/ML skills, dropping it to ~14k. Then, we ran these profiles through a SentenceTransformer (`all-MiniLM-L6-v2`) and FAISS to compute a semantic score against the JD. Finally, we re-ranked the top matches using a weighted formula that factored in exact hard-skill overlaps, experience brackets (penalizing under/over experienced), and behavioral signals (ghosting rates, profile completeness). We also explicitly built a chronological trap-filter to eliminate honeypots.

